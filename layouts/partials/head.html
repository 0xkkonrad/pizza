<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
{{ with .OutputFormats.Get "rss" }}<link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ $.Site.Title }}">{{ end }}
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%8D%95</text></svg>">
<style>
:root{
  color-scheme: light;
  --paper:#f4f1e7; --ink:#1c1917; --muted:#6f6656; --hair:#d7cfbf;
  --serif: Georgia, "Times New Roman", Times, serif;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--serif);font-size:1.0625rem;line-height:1.65}
.wrap{max-width:40rem;margin:0 auto;padding:2.2rem 1.2rem 3rem}
a{color:inherit;text-underline-offset:2px}
main{min-height:40vh}

/* Masthead — one font, one size, centered */
.masthead{text-align:center;padding-bottom:1.1rem}
.masthead .title{display:inline-block;font-weight:700;font-size:clamp(1.9rem,5.5vw,2.5rem);letter-spacing:-.01em;text-decoration:none;line-height:1}
.masthead .tagline{font-family:var(--sans);font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:.6rem}
.masthead nav{font-family:var(--sans);font-size:.8rem;letter-spacing:.05em;margin-top:.7rem}
.masthead nav a{color:var(--muted);text-decoration:none;margin:0 .35rem}
.masthead nav a:hover{color:var(--ink)}
.rule{border:0;border-top:1px solid var(--ink);margin:0 0 2rem}

/* Meta: the only sans, small, uppercase treatment */
.meta{font-family:var(--sans);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

/* Headings — just h1 and h2 */
h1{font-family:var(--serif);font-weight:700;font-size:1.6rem;line-height:1.15;margin:0 0 .3rem}
h2{font-family:var(--serif);font-weight:700;font-size:1.2rem;line-height:1.3;margin:2rem 0 .6rem}

/* Prose */
.prose p{margin:0 0 1.15rem}
.prose a{text-decoration-thickness:1px}
.post-meta{margin:.15rem 0 1.4rem}

/* The review list */
dl.review{margin:1.5rem 0 2rem;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
dl.review .r{display:grid;grid-template-columns:9.5rem 1fr;gap:.3rem 1rem;padding:.55rem 0;border-bottom:1px solid var(--hair)}
dl.review .r:last-child{border-bottom:0}
dl.review dt{font-family:var(--sans);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding-top:.2rem}
dl.review dd{margin:0}
dl.review dd:empty::before{content:"—";color:var(--muted)}
@media(max-width:30rem){dl.review .r{grid-template-columns:1fr;gap:.05rem;padding:.6rem 0}}

/* Figures */
figure{margin:1.9rem 0;text-align:center}
figure img{max-width:100%;height:auto;border:1px solid var(--ink)}
.pizza-fig .frame{border:1px solid var(--ink);padding:1.3rem 0;display:flex;justify-content:center}
.pizza-fig svg{width:min(13rem,55%);height:auto}
figcaption{font-family:var(--sans);font-size:.75rem;letter-spacing:.03em;color:var(--muted);margin-top:.55rem}

/* Home / section list */
ul.posts{list-style:none;margin:0;padding:0}
ul.posts li{padding:1.2rem 0;border-bottom:1px solid var(--hair)}
ul.posts li:last-child{border-bottom:0}
ul.posts .t{font-size:1.2rem;font-weight:700;text-decoration:none;line-height:1.2;font-family:var(--serif)}
ul.posts .t:hover{text-decoration:underline}
ul.posts .meta{margin:.3rem 0 .45rem}
ul.posts .sum{margin:0}

/* Post nav + footer */
.postnav{margin-top:2.4rem;padding-top:1rem;border-top:1px solid var(--hair);font-family:var(--sans);font-size:.78rem;letter-spacing:.05em;display:flex;justify-content:space-between;gap:1rem}
.postnav a{color:var(--ink);text-decoration:none}
.postnav a:hover{text-decoration:underline}
.foot{margin-top:2.6rem;padding-top:1.1rem;border-top:1px solid var(--ink);font-family:var(--sans);font-size:.76rem;letter-spacing:.04em;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.foot a{color:var(--muted)}
</style>
</head>
