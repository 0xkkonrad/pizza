baseURL = "https://margheritapapers.com/"
defaultContentLanguage = "en"
title = "Margherita Papers"

[languages.en]
  locale = "en-us"
  weight = 1
enableEmoji = true
enableRobotsTXT = true
summaryLength = 25
disableKinds = ["taxonomy", "term"]

[params]
  author = "Konrad & Natalia"
  description = "Konrad & Natalia review pizza — a small, slow, memoir-style pizza journal."
  tagline = "Konrad & Natalia review pizza"

[markup.goldmark.renderer]
  unsafe = true

[markup.goldmark.parser]
  wrapStandAloneImageWithinParagraph = false

[[menus.main]]
  name = "Reviews"
  pageRef = "/reviews"
  weight = 1

[[menus.main]]
  name = "About"
  pageRef = "/about"
  weight = 2
